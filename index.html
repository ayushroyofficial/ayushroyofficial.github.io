<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayush Roy | Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            line-height: 1.6;
            padding-top: 80px;
        }

        /* Fixed Top Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 8%;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            background: rgba(11, 15, 25, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #3b82f6;
        }

        /* Main Hero Header */
        header {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .badge {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #3b82f6;
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-size: 3.8rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        header p {
            font-size: 1.2rem;
            color: #9ca3af;
            max-width: 650px;
            font-weight: 300;
            margin-bottom: 2rem;
        }

        /* Layout Grid Container */
        .container {
            max-width: 950px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: #ffffff;
            border-left: 4px solid #3b82f6;
            padding-left: 10px;
        }

        /* Project Cards Stack */
        .card-stack {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 2rem;
            transition: transform 0.2s, border-color 0.2s;
        }

        .project-card:hover {
            transform: translateY(-2px);
            border-color: rgba(59, 130, 246, 0.4);
            background: rgba(255, 255, 255, 0.03);
        }

        .tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            display: inline-block;
        }
