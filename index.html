<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayush Roy | Premium Physics & Design Courses</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b1120;
            --bg-card: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6; /* Clean premium blue */
            --accent-cyan: #06b6d4;
            --border-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* Top Header Banner */
        .hero-banner {
            background-color: #0f172a;
            padding: 3rem 10%;
            border-bottom: 1px solid var(--border-color);
        }

        .breadcrumb {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .hero-banner h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-banner p {
            color: var(--text-muted);
            max-width: 800px;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .badge {
            background: var(--accent-blue);
            color: #ffffff;
            font-weight: 600;
            font-size: 0.75rem;
            padding: 0.25rem 0.7rem;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .meta-info {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Main Page Layout Grid */
        .main-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        /* Left Side Content */
        .content-left {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .section-box {
            background: #111827;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
        }

        .section-box h2 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
