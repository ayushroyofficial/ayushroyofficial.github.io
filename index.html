<!DOCTYPE html>
<html>

<head>

<title>Ayush Roy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(
135deg,
#000000,
#111827,
#3b0764,
#000000
);

background-size:400% 400%;
animation:bgmove 15s infinite;

color:white;
}
  body::before{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background-image:
radial-gradient(white 1px, transparent 1px);

background-size:50px 50px;

opacity:0.15;

animation:stars 100s linear infinite;

z-index:-1;
}

@keyframes stars{

from{
transform:translateY(0);
}

to{
transform:translateY(-2000px);
}

}

@keyframes bgmove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

header{
background:rgba(0,0,0,0.5);
padding:20px;
backdrop-filter:blur(10px);
}
<img
src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
class="robot"
>
  .robot{

width:220px;

animation:float 4s ease-in-out infinite;

margin-bottom:20px;

filter:drop-shadow(0 0 30px #38bdf8);
}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-20px);
}

100%{
transform:translateY(0px);
}

}
h1{

font-size:75px;

margin-top:120px;

background:linear-gradient(
to right,
#38bdf8,
#818cf8,
#c084fc
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{

font-size:24px;

margin-top:20px;

color:#cbd5e1;
}

button{

padding:16px 35px;

margin-top:30px;

border:none;

border-radius:50px;

background:linear-gradient(
to right,
#38bdf8,
#818cf8
);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:0.3s;
}

button:hover{

transform:scale(1.05);

box-shadow:0 0 20px #38bdf8;
}

footer{

margin-top:180px;

padding:25px;

background:rgba(0,0,0,0.5);

text-align:center;

color:#94a3b8;
}

</style>

</head>

<body>

<header>

<h2>Ayush Roy</h2>

</header>

<h1>Welcome To My Website</h1>

<p>
Exploring Ideas • Building Projects • Creating the Future
</p>

<button>
My Projects
</button>

<footer>

© 2026 Ayush Roy

</footer>

</body>

</html>
