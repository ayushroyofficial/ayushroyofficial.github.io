<!DOCTYPE html>
<html>

<head>

<title>Ayush Roy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(
135deg,
#020617,
#0f172a,
#1e1b4b,
#020617
);

background-size:400% 400%;
animation:bgmove 15s infinite;

color:white;
}

@keyframes bgmove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

header{
background:rgba(0,0,0,0.5);
padding:20px;
backdrop-filter:blur(10px);
}

h1{

font-size:75px;

margin-top:120px;

background:linear-gradient(
to right,
#38bdf8,
#818cf8,
#c084fc
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{

font-size:24px;

margin-top:20px;

color:#cbd5e1;
}

button{

padding:16px 35px;

margin-top:30px;

border:none;

border-radius:50px;

background:linear-gradient(
to right,
#38bdf8,
#818cf8
);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:0.3s;
}

button:hover{

transform:scale(1.05);

box-shadow:0 0 20px #38bdf8;
}

footer{

margin-top:180px;

padding:25px;

background:rgba(0,0,0,0.5);

text-align:center;

color:#94a3b8;
}

</style>

</head>

<body>

<header>

<h2>Ayush Roy</h2>

</header>

<h1>Welcome To My Website</h1>

<p>
Exploring Ideas • Building Projects • Creating the Future
</p>

<button>
My Projects
</button>

<footer>

© 2026 Ayush Roy

</footer>

</body>

</html>
